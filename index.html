<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mesa BRL · câmbio · juros · curva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#081210; --panel:#0c1a16; --panel2:#0a1612; --line:rgba(124,168,154,.14);
  --ink:#d2e6dc; --dim:#728d83; --faint:#47615a;
  --amber:#e7b250; --up:#46d09a; --down:#e8745a; --pre:#5fa0db; --cup:#d98a5b;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
  --sans:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;font-size:14px}
body{background:
  radial-gradient(1200px 600px at 80% -10%, rgba(38,76,66,.30), transparent 60%),
  radial-gradient(900px 500px at -10% 110%, rgba(28,58,52,.22), transparent 55%),
  var(--bg);min-height:100vh}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--dim)}

/* ---------- topbar ---------- */
.topbar{display:flex;align-items:baseline;justify-content:space-between;gap:16px;
  padding:16px 22px 14px;border-bottom:1px solid var(--line)}
.brand{font-weight:700;letter-spacing:.14em;font-size:15px}
.brand span{font-weight:400;letter-spacing:.22em;color:var(--dim);font-size:11px;
  margin-left:12px;text-transform:uppercase}
.meta{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.06em;white-space:nowrap}
.meta b{color:var(--ink);font-weight:500}
.live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--up);margin-right:7px;vertical-align:middle;box-shadow:0 0 8px var(--up)}

/* ---------- fx strip ---------- */
.fxstrip{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--line);
  scrollbar-width:none}
.fxstrip::-webkit-scrollbar{display:none}
.fxtile{flex:0 0 auto;min-width:132px;padding:11px 18px;border-right:1px solid var(--line);
  display:flex;flex-direction:column;gap:3px}
.fxtile.hero{min-width:184px;background:linear-gradient(180deg,rgba(231,178,80,.06),transparent)}
.fxtile .pair{font-size:10.5px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase}
.fxtile .px{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1.1}
.fxtile.hero .px{font-size:26px;color:var(--amber)}
.fxtile .chg{font-family:var(--mono);font-size:11.5px;font-weight:500}
.sep{flex:0 0 auto;width:1px;background:var(--line);margin:0}
.grouplabel{flex:0 0 auto;align-self:center;writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:9px;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;padding:0 4px}

/* ---------- grid ---------- */
.grid{display:grid;grid-template-columns:1.65fr 1fr;gap:14px;padding:14px;align-items:start}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);border-radius:10px;overflow:hidden}
.panel>header{display:flex;align-items:baseline;justify-content:space-between;
  padding:12px 16px 10px;border-bottom:1px solid var(--line)}
.panel>header .ttl{font-weight:600;letter-spacing:.16em;font-size:12px;text-transform:uppercase}
.panel>header .sub{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.08em}
.side{display:flex;flex-direction:column;gap:14px}

/* ---------- chart ---------- */
.chartwrap{padding:10px 12px 2px}
#chart{width:100%;height:230px;display:block}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:6px 16px 12px;
  font-size:10.5px;color:var(--dim);letter-spacing:.04em}
.legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle}

/* ---------- dol table ---------- */
table.dol{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
table.dol th{font-family:var(--sans);font-size:9.5px;letter-spacing:.12em;color:var(--faint);
  text-transform:uppercase;font-weight:600;text-align:right;padding:8px 16px 7px}
table.dol th:first-child,table.dol td:first-child{text-align:left}
table.dol td{padding:6px 16px;text-align:right;border-top:1px solid rgba(124,168,154,.07)}
table.dol td.code{color:var(--dim)} table.dol td.dol{color:var(--ink);font-weight:600}
table.dol td.pre{color:var(--pre)} table.dol td.cup{color:var(--cup)}
table.dol tr.interp td.cup::after{content:" △";color:var(--faint);font-size:9px}

/* ---------- stat lists ---------- */
.stats{padding:6px 4px}
.stat{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  padding:10px 16px;border-top:1px solid rgba(124,168,154,.07)}
.stat:first-child{border-top:none}
.stat .k{font-size:11px;color:var(--dim);letter-spacing:.04em}
.stat .k small{display:block;color:var(--faint);font-size:9px;letter-spacing:.06em;margin-top:2px}
.stat .v{font-family:var(--mono);font-size:17px;font-weight:500;text-align:right;white-space:nowrap}
.stat .v small{font-size:11px;color:var(--dim);margin-left:3px}
.focusgrid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.focusgrid .stat{border-top:1px solid rgba(124,168,154,.07)}
.focusgrid .stat:nth-child(-n+2){border-top:none}
.focusgrid .stat:nth-child(odd){border-right:1px solid rgba(124,168,154,.07)}

/* ---------- footer ---------- */
.foot{padding:14px 22px 22px;color:var(--faint);font-family:var(--mono);font-size:10.5px;
  letter-spacing:.05em;border-top:1px solid var(--line);margin-top:6px;line-height:1.7}
.foot b{color:var(--dim);font-weight:500}

@media(max-width:880px){
  .grid{grid-template-columns:1fr}
  .topbar{flex-direction:column;gap:6px;align-items:flex-start}
  .fxtile.hero .px{font-size:23px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">MESA BRL <span>câmbio · juros · curva</span></div>
  <div class="meta">dados <b id="dataDate">—</b> · <span class="live"></span><b id="clock">—</b></div>
</div>

<div class="fxstrip" id="fxstrip"></div>

<div class="grid">
  <div class="panel">
    <header><span class="ttl">Curva DOL</span><span class="sub" id="curveSub">forward USD/BRL · CIP</span></header>
    <div class="chartwrap"><svg id="chart" viewBox="0 0 760 230" preserveAspectRatio="none"></svg></div>
    <div class="legend">
      <span><i style="background:var(--amber)"></i>casado (spot)</span>
      <span><i style="background:var(--up)"></i>DOL forward</span>
      <span><i style="background:var(--pre)"></i>perna pré</span>
      <span><i style="background:var(--cup)"></i>perna cupom</span>
    </div>
    <table class="dol" id="dolTable">
      <thead><tr><th>cód</th><th>venc</th><th>du</th><th>pré%</th><th>cup%</th><th>DOL</th><th>pts</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="side">
    <div class="panel">
      <header><span class="ttl">Carry &amp; Juros</span><span class="sub" id="ratesDate">BCB</span></header>
      <div class="stats" id="carry"></div>
    </div>
    <div class="panel">
      <header><span class="ttl">Focus</span><span class="sub" id="focusSub">expectativas · mediana</span></header>
      <div class="focusgrid" id="focus"></div>
    </div>
  </div>
</div>

<div class="foot" id="foot">—</div>

<script>
const $=id=>document.getElementById(id);
const PAIRS=[
  {k:"USDBRL",api:"USD-BRL",lab:"USD/BRL",hero:true,grp:"brl"},
  {k:"EURBRL",api:"EUR-BRL",lab:"EUR/BRL",grp:"brl"},
  {k:"GBPBRL",api:"GBP-BRL",lab:"GBP/BRL",grp:"brl"},
  {k:"USDMXN",api:"USD-MXN",lab:"USD/MXN",grp:"peer"},
  {k:"USDCLP",api:"USD-CLP",lab:"USD/CLP",grp:"peer"},
  {k:"USDZAR",api:"USD-ZAR",lab:"USD/ZAR",grp:"peer"},
  {k:"USDCNY",api:"USD-CNY",lab:"USD/CNY",grp:"peer"},
  {k:"USDJPY",api:"USD-JPY",lab:"USD/JPY",grp:"peer"},
];
const FEED=PAIRS.map(p=>p.api).join(",");
let DATA={}, FX={}, SPOT=null;

/* ---------- formatação ---------- */
const nf=(x,d=4)=>x==null||isNaN(x)?"—":Number(x).toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d});
const pf=(x,d=2)=>x==null||isNaN(x)?"—":(x>=0?"+":"")+Number(x).toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d})+"%";
const cls=x=>x>0.0001?"up":x<-0.0001?"down":"flat";
const arrow=x=>x>0.0001?"▲":x<-0.0001?"▼":"·";
function decFor(v){ if(v==null)return 4; const a=Math.abs(v); return a>=1000?1:a>=100?2:a>=10?3:4; }

/* ---------- FX strip ---------- */
function renderFX(){
  const el=$("fxstrip"); el.innerHTML="";
  let lastGrp=null;
  PAIRS.forEach(p=>{
    const q=FX[p.k]; if(!q) return;
    if(p.grp!=="brl" && lastGrp==="brl"){
      const s=document.createElement("div"); s.className="sep"; el.appendChild(s);
      const g=document.createElement("div"); g.className="grouplabel"; g.textContent="USD vs"; el.appendChild(g);
    }
    lastGrp=p.grp;
    const d=document.createElement("div"); d.className="fxtile"+(p.hero?" hero":"");
    d.innerHTML=`<div class="pair">${p.lab}</div>
      <div class="px">${nf(q.bid,decFor(q.bid))}</div>
      <div class="chg ${cls(q.pct)}">${arrow(q.pct)} ${pf(q.pct)}</div>`;
    el.appendChild(d);
  });
}

/* ---------- curva DOL ---------- */
function svensson(tau,p){
  const e=Math.exp, l1=p.l1,l2=p.l2;
  const t1=(1-e(-l1*tau))/(l1*tau), t2=t1-e(-l1*tau);
  const t3=(1-e(-l2*tau))/(l2*tau)-e(-l2*tau);
  return p.b1+p.b2*t1+p.b3*t2+p.b4*t3;
}
function computeCurve(){
  const vs=DATA.vencimentos, pre=DATA.pre, cup=(DATA.cupom&&DATA.cupom.byCode)||{};
  if(!vs||!pre||pre.b1==null||SPOT==null){ return null; }
  return vs.map(v=>{
    const tau=v.du/252;
    const pr=svensson(tau,pre);                 // pré decimal
    const cp=(cup[v.code]!=null?cup[v.code]:0)/100;  // cupom decimal
    const dol=SPOT*Math.pow(1+pr,tau)/(1+cp*v.dc/360);
    return {...v, pre:pr*100, cup:(cup[v.code]!=null?cup[v.code]:null), dol, pts:dol*1000,
            interp:false};
  });
}
function renderTable(rows){
  const tb=$("dolTable").querySelector("tbody"); tb.innerHTML="";
  rows.forEach(r=>{
    const tr=document.createElement("tr");
    const vd=r.venc.split("-").reverse().join("/");
    tr.innerHTML=`<td class="code">${r.code}</td><td>${vd}</td><td>${r.du}</td>
      <td class="pre">${r.pre.toFixed(3)}</td>
      <td class="cup">${r.cup!=null?r.cup.toFixed(3):"—"}</td>
      <td class="dol">${nf(r.dol,4)}</td><td>${r.pts.toFixed(1)}</td>`;
    tb.appendChild(tr);
  });
}
function renderChart(rows){
  const W=760,H=230,padL=8,padR=8,padT=14,padB=20;
  const svg=$("chart"); svg.innerHTML="";
  const ns="http://www.w3.org/2000/svg";
  const ys=rows.map(r=>r.dol).concat([SPOT]);
  let lo=Math.min(...ys), hi=Math.max(...ys); const m=(hi-lo)*0.12||0.1; lo-=m; hi+=m;
  const x=i=>padL+(W-padL-padR)*i/(rows.length-1);
  const y=v=>padT+(H-padT-padB)*(1-(v-lo)/(hi-lo));
  const mk=(t,a)=>{const e=document.createElementNS(ns,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  // casado dashed
  const yc=y(SPOT);
  svg.appendChild(mk("line",{x1:padL,y1:yc,x2:W-padR,y2:yc,stroke:"var(--amber)",
    "stroke-width":1,"stroke-dasharray":"4 4","opacity":.7}));
  svg.appendChild(mk("text",{x:W-padR,y:yc-5,fill:"var(--amber)","font-size":10,
    "text-anchor":"end","font-family":"var(--mono)"})).textContent="casado "+nf(SPOT,4);
  // area + line
  let dl=`M ${x(0)} ${y(rows[0].dol)}`, da=`M ${x(0)} ${y(rows[0].dol)}`;
  rows.forEach((r,i)=>{ if(i){dl+=` L ${x(i)} ${y(r.dol)}`; da+=` L ${x(i)} ${y(r.dol)}`;} });
  da+=` L ${x(rows.length-1)} ${H-padB} L ${x(0)} ${H-padB} Z`;
  const grad=mk("linearGradient",{id:"g1",x1:0,y1:0,x2:0,y2:1});
  grad.appendChild(mk("stop",{offset:"0%","stop-color":"var(--up)","stop-opacity":.20}));
  grad.appendChild(mk("stop",{offset:"100%","stop-color":"var(--up)","stop-opacity":0}));
  svg.appendChild(grad);
  svg.appendChild(mk("path",{d:da,fill:"url(#g1)"}));
  svg.appendChild(mk("path",{d:dl,fill:"none",stroke:"var(--up)","stroke-width":1.8}));
  rows.forEach((r,i)=>{ svg.appendChild(mk("circle",{cx:x(i),cy:y(r.dol),r:2.4,fill:"var(--up)"})); });
  // x labels (cada 2)
  rows.forEach((r,i)=>{ if(i%2===0){ const t=mk("text",{x:x(i),y:H-6,fill:"var(--faint)",
    "font-size":9,"text-anchor":"middle","font-family":"var(--mono)"});
    t.textContent=r.code.slice(3); svg.appendChild(t);} });
}

/* ---------- carry & juros ---------- */
function statRow(k,sub,v,unit,colorVal){
  return `<div class="stat"><div class="k">${k}${sub?`<small>${sub}</small>`:""}</div>
    <div class="v ${colorVal||""}">${v}<small>${unit||""}</small></div></div>`;
}
function renderCarry(){
  const r=DATA.rates||{}, el=$("carry"); let h="";
  const g=(o)=> (o&&o.valor!=null)?o.valor:null;
  const selic=g(r.selic), ipca=g(r.ipca12m), real=g(r.juroreal), ptax=g(r.ptax);
  // DI 1 ano implícito (Svensson em ~252 du)
  let di1=null; if(DATA.pre&&DATA.pre.b1!=null){ di1=svensson(1,DATA.pre)*100; }
  h+=statRow("Selic meta","Copom · a.a.", selic!=null?selic.toLocaleString("pt-BR",{minimumFractionDigits:2}):"—","%");
  h+=statRow("DI 1 ano","curva ANBIMA · a.a.", di1!=null?di1.toFixed(2):"—","%");
  h+=statRow("IPCA","acum. 12m", ipca!=null?ipca.toLocaleString("pt-BR",{minimumFractionDigits:2}):"—","%");
  h+=statRow("Juro real","ex-post (Selic/IPCA)", real!=null?real.toLocaleString("pt-BR",{minimumFractionDigits:2}):"—","%", real!=null?cls(real):"");
  h+=statRow("PTAX","dólar venda · BCB", ptax!=null?nf(ptax,4):"—","");
  el.innerHTML=h;
  if(r.selic&&r.selic.data) $("ratesDate").textContent="BCB · "+r.selic.data;
}

/* ---------- focus ---------- */
function renderFocus(){
  const f=DATA.focus||{}, el=$("focus");
  const fmt=(o,d=2)=>(o&&o.mediana!=null)?Number(o.mediana).toLocaleString("pt-BR",{minimumFractionDigits:d,maximumFractionDigits:d}):"—";
  let h="";
  h+=statRow("Selic","fim do ano",fmt(f.selic),"%");
  h+=statRow("IPCA","fim do ano",fmt(f.ipca),"%");
  h+=statRow("Câmbio","USD/BRL fim ano",fmt(f.cambio,2),"");
  h+=statRow("PIB","crescimento",fmt(f.pib),"%");
  el.innerHTML=h;
  if(f.ano) $("focusSub").textContent="mediana · ref. "+f.ano;
}

/* ---------- render geral ---------- */
function renderAll(){
  renderFX();
  const rows=computeCurve();
  if(rows){ renderChart(rows); renderTable(rows); }
  renderCarry(); renderFocus();
  $("dataDate").textContent=DATA.refdate||"—";
  $("foot").innerHTML=`<b>fontes:</b> câmbio AwesomeAPI (ao vivo) · juros &amp; Focus Banco Central · pré ANBIMA · cupom B3`
    +` &nbsp;·&nbsp; <b>curva:</b> spot ao vivo × carrego (pré−cupom) recalculado no fechamento`
    +` &nbsp;·&nbsp; robô automático · dados de ${DATA.refdate||"—"}`;
}

/* ---------- dados ---------- */
async function loadData(){
  try{
    const r=await fetch("./curve.json?t="+Date.now(),{cache:"no-store"});
    if(r.ok){ DATA=await r.json();
      if(DATA.fx&&!Object.keys(FX).length){ // semente até o feed ao vivo chegar
        for(const k in DATA.fx){ FX[k]={bid:DATA.fx[k].bid,pct:DATA.fx[k].pct}; }
        if(FX.USDBRL) SPOT=FX.USDBRL.bid;
      }
      renderAll();
    }
  }catch(e){}
}
async function fetchFX(){
  try{
    const r=await fetch(`https://economia.awesomeapi.com.br/json/last/${FEED}`,{cache:"no-store"});
    const d=await r.json();
    for(const k in d){ FX[k]={bid:parseFloat(d[k].bid),pct:parseFloat(d[k].pctChange||0)}; }
    if(FX.USDBRL) SPOT=FX.USDBRL.bid;
    renderAll();
  }catch(e){}
}
function tick(){ $("clock").textContent=new Date().toLocaleTimeString("pt-BR"); }

/* ---------- boot ---------- */
tick(); setInterval(tick,1000);
loadData();
fetchFX();
setInterval(fetchFX,30000);
setInterval(loadData,3600000);
</script>
</body>
</html>
