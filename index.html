<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BRL Desk · fx · rates · curve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070f0d; --panel:#0c1a16; --panel2:#0a1612; --line:rgba(124,168,154,.13);
  --ink:#d6e9df; --dim:#7a958b; --faint:#4a655d;
  --amber:#ecb659; --up:#4ad6a3; --down:#ec7a5f; --pre:#62a6e0; --cup:#dd9160; --dxy:#93c4ec;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,Consolas,monospace;
  --sans:'IBM Plex Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  -webkit-font-smoothing:antialiased;font-size:14px}
body{background:
  radial-gradient(1100px 560px at 82% -12%, rgba(40,82,70,.32), transparent 60%),
  radial-gradient(820px 460px at -8% 112%, rgba(26,56,50,.24), transparent 55%),
  var(--bg);min-height:100vh}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--dim)}

@keyframes flup{0%{background-color:rgba(74,214,163,.34)}100%{background-color:transparent}}
@keyframes fldn{0%{background-color:rgba(236,122,95,.34)}100%{background-color:transparent}}
.flash-up{animation:flup .7s ease-out}
.flash-down{animation:fldn .7s ease-out}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--up)}50%{opacity:.3;box-shadow:0 0 2px var(--up)}}

.topbar{display:flex;align-items:baseline;justify-content:space-between;gap:16px;
  padding:15px 24px 13px;border-bottom:1px solid var(--line)}
.brand{font-weight:700;letter-spacing:.16em;font-size:15px}
.brand b{color:var(--amber);font-weight:700}
.brand span{font-weight:400;letter-spacing:.24em;color:var(--dim);font-size:10.5px;
  margin-left:13px;text-transform:uppercase}
.meta{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.06em;white-space:nowrap}
.meta b{color:var(--ink);font-weight:500}
.live::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--up);margin-right:7px;vertical-align:middle;animation:pulse 1.8s ease-in-out infinite}

.fxstrip{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--line);scrollbar-width:none}
.fxstrip::-webkit-scrollbar{display:none}
.fxtile{position:relative;flex:0 0 auto;min-width:126px;padding:11px 18px;
  border-right:1px solid var(--line);display:flex;flex-direction:column;gap:3px;cursor:default;
  transition:background .15s}
.fxtile:hover{background:rgba(124,168,154,.05)}
.fxtile.hero{min-width:176px;background:linear-gradient(180deg,rgba(236,182,89,.07),transparent)}
.fxtile.dxy{background:linear-gradient(180deg,rgba(147,196,236,.09),transparent)}
.fxtile .pair{font-size:10px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase}
.fxtile .px{font-family:var(--mono);font-size:19px;font-weight:500;line-height:1.1}
.fxtile.hero .px{font-size:26px;color:var(--amber)}
.fxtile.dxy .px{color:var(--dxy)}
.fxtile .chg{font-family:var(--mono);font-size:11.5px;font-weight:500}
.sep{flex:0 0 auto;width:1px;background:var(--line)}
.grouplabel{flex:0 0 auto;align-self:center;writing-mode:vertical-rl;transform:rotate(180deg);
  font-size:8.5px;letter-spacing:.24em;color:var(--faint);text-transform:uppercase;padding:0 5px}
.tip{position:absolute;top:calc(100% + 4px);left:8px;z-index:50;min-width:160px;
  background:#0b1b16;border:1px solid var(--line);border-radius:8px;padding:9px 11px;
  box-shadow:0 16px 38px rgba(0,0,0,.6);display:none;font-family:var(--mono);font-size:11px}
.fxtile:hover .tip{display:block}
.tip div{display:flex;justify-content:space-between;gap:18px;padding:2.5px 0}
.tip span{color:var(--dim)} .tip b{font-weight:500;color:var(--ink)}

.grid{display:grid;grid-template-columns:1.68fr 1fr;gap:14px;padding:14px;align-items:start}
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);border-radius:11px;overflow:hidden}
.panel>header{display:flex;align-items:baseline;justify-content:space-between;
  padding:13px 17px 11px;border-bottom:1px solid var(--line)}
.panel>header .ttl{font-weight:600;letter-spacing:.17em;font-size:12px;text-transform:uppercase}
.panel>header .sub{font-family:var(--mono);font-size:10.5px;color:var(--dim);letter-spacing:.08em}
.side{display:flex;flex-direction:column;gap:14px}

.chartwrap{position:relative;padding:12px 12px 2px}
#chart{width:100%;height:248px;display:block}
.chartwrap .ctip{position:absolute;z-index:20;pointer-events:none;display:none;
  background:#0b1b16;border:1px solid var(--line);border-radius:7px;padding:6px 9px;
  font-family:var(--mono);font-size:11px;white-space:nowrap;
  box-shadow:0 12px 28px rgba(0,0,0,.55);transform:translate(-50%,-115%)}
.ctip .c{color:var(--dim);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase}
.ctip .d{color:var(--up);font-weight:600;font-size:14px}
.ctip .p{color:var(--dim)}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:4px 17px 13px;
  font-size:10.5px;color:var(--dim);letter-spacing:.04em}
.legend i{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:6px;vertical-align:middle}

table.dol{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
table.dol th{font-family:var(--sans);font-size:9.5px;letter-spacing:.13em;color:var(--faint);
  text-transform:uppercase;font-weight:600;text-align:right;padding:9px 17px 7px}
table.dol th:first-child,table.dol td:first-child{text-align:left}
table.dol td{padding:6.5px 17px;text-align:right;border-top:1px solid rgba(124,168,154,.06)}
table.dol tbody tr{transition:background .12s}
table.dol tbody tr:hover{background:rgba(124,168,154,.05)}
table.dol td.code{color:var(--dim);letter-spacing:.03em}
table.dol td.dol{color:var(--ink);font-weight:600;font-size:13px}
table.dol td.pre{color:var(--pre)} table.dol td.cup{color:var(--cup)}

.stats{padding:4px 4px}
.stat{display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  padding:11px 17px;border-top:1px solid rgba(124,168,154,.06)}
.stat:first-child{border-top:none}
.stat .k{font-size:11px;color:var(--dim);letter-spacing:.04em}
.stat .k small{display:block;color:var(--faint);font-size:9px;letter-spacing:.05em;margin-top:2px}
.stat .v{font-family:var(--mono);font-size:17px;font-weight:500;text-align:right;white-space:nowrap}
.stat .v small{font-size:11px;color:var(--dim);margin-left:3px}
.focusgrid{display:grid;grid-template-columns:1fr 1fr}
.focusgrid .stat{border-top:1px solid rgba(124,168,154,.06)}
.focusgrid .stat:nth-child(-n+2){border-top:none}
.focusgrid .stat:nth-child(odd){border-right:1px solid rgba(124,168,154,.06)}

@media(max-width:880px){
  .grid{grid-template-columns:1fr}
  .topbar{flex-direction:column;gap:6px;align-items:flex-start}
  .fxtile.hero .px{font-size:23px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">BRL <b>DESK</b> <span>fx · rates · curve</span></div>
  <div class="meta">as of <b id="dataDate">—</b> · <span class="live"></span><b id="clock">—</b></div>
</div>

<div class="fxstrip" id="fxstrip"></div>

<div class="grid">
  <div class="panel">
    <header><span class="ttl">USD/BRL Curve</span><span class="sub">forward · covered interest parity</span></header>
    <div class="chartwrap" id="chartwrap">
      <svg id="chart" viewBox="0 0 780 248" preserveAspectRatio="none"></svg>
      <div class="ctip" id="ctip"></div>
    </div>
    <div class="legend">
      <span><i style="background:var(--up)"></i>forward</span>
      <span><i style="background:var(--pre)"></i>BRL rate (pré)</span>
      <span><i style="background:var(--cup)"></i>USD cupom</span>
    </div>
    <table class="dol" id="dolTable">
      <thead><tr><th>code</th><th>fwd</th><th>maturity</th><th>bd</th><th>rate%</th><th>cup%</th><th>pts</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="side">
    <div class="panel">
      <header><span class="ttl">Carry &amp; Rates</span><span class="sub" id="ratesDate">BCB</span></header>
      <div class="stats" id="carry"></div>
    </div>
    <div class="panel">
      <header><span class="ttl">Focus Survey</span><span class="sub" id="focusSub">median · year-end</span></header>
      <div class="focusgrid" id="focus"></div>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const GRP={dolar:"USD",brl:"BRL",major:"majors",em:"EM"};
const PAIRS=[
  {k:"DXY",   lab:"DXY",     grp:"dolar", calc:true},
  {k:"USDBRL",api:"USD-BRL", lab:"USD/BRL",hero:true, grp:"brl"},
  {k:"EURBRL",api:"EUR-BRL", lab:"EUR/BRL", grp:"brl"},
  {k:"GBPBRL",api:"GBP-BRL", lab:"GBP/BRL", grp:"brl"},
  {k:"EURUSD",api:"EUR-USD", lab:"EUR/USD", grp:"major"},
  {k:"GBPUSD",api:"GBP-USD", lab:"GBP/USD", grp:"major"},
  {k:"USDJPY",api:"USD-JPY", lab:"USD/JPY", grp:"major"},
  {k:"USDMXN",api:"USD-MXN", lab:"USD/MXN", grp:"em"},
  {k:"USDCLP",api:"USD-CLP", lab:"USD/CLP", grp:"em"},
  {k:"USDZAR",api:"USD-ZAR", lab:"USD/ZAR", grp:"em"},
  {k:"USDCNY",api:"USD-CNY", lab:"USD/CNY", grp:"em"},
];
const DXY_EXTRA=["USD-CAD","USD-SEK","USD-CHF"];
const FEED=[...PAIRS.filter(p=>p.api).map(p=>p.api), ...DXY_EXTRA].join(",");
let DATA={}, FX={}, SPOT=null, fxBuilt=false, tableBuilt=false, CHART=null;

const nf=(x,d=4)=>x==null||isNaN(x)?"—":Number(x).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const pf=(x,d=2)=>x==null||isNaN(x)?"—":(x>=0?"+":"")+Number(x).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})+"%";
const cls=x=>x>0.0001?"up":x<-0.0001?"down":"flat";
const arrow=x=>x>0.0001?"▲":x<-0.0001?"▼":"·";
const decFor=v=>{if(v==null)return 4;const a=Math.abs(v);return a>=1000?1:a>=100?2:a>=10?3:4;};
function flash(el,dir){ if(!el)return; el.classList.remove("flash-up","flash-down");
  void el.offsetWidth; el.classList.add(dir>0?"flash-up":"flash-down"); }

/* ---------- DXY (ICE formula) ---------- */
function computeDXY(){
  const g=k=>FX[k]&&FX[k].bid;
  const e=g("EURUSD"),j=g("USDJPY"),gb=g("GBPUSD"),c=g("USDCAD"),s=g("USDSEK"),ch=g("USDCHF");
  if(![e,j,gb,c,s,ch].every(Boolean)) return null;
  const f=(E,J,G,C,S,H)=>50.14348112*Math.pow(E,-0.576)*Math.pow(J,0.136)*Math.pow(G,-0.119)
        *Math.pow(C,0.091)*Math.pow(S,0.042)*Math.pow(H,0.036);
  const now=f(e,j,gb,c,s,ch);
  const pv=k=>{const o=FX[k];return o.bid/(1+(o.pct||0)/100);};
  const prev=f(pv("EURUSD"),pv("USDJPY"),pv("GBPUSD"),pv("USDCAD"),pv("USDSEK"),pv("USDCHF"));
  return {bid:now, pct:(now/prev-1)*100};
}

/* ---------- FX strip ---------- */
function buildFX(){
  const strip=$("fxstrip"); strip.innerHTML=""; let last=null;
  PAIRS.forEach(p=>{
    if(p.grp!==last){
      if(last!==null){const s=document.createElement("div");s.className="sep";strip.appendChild(s);}
      const g=document.createElement("div");g.className="grouplabel";g.textContent=GRP[p.grp];strip.appendChild(g);
    }
    last=p.grp;
    const d=document.createElement("div");
    d.className="fxtile"+(p.hero?" hero":"")+(p.k==="DXY"?" dxy":"");
    d.dataset.k=p.k;
    d.innerHTML=`<div class="pair">${p.lab}</div><div class="px">—</div>
      <div class="chg flat">·</div><div class="tip"></div>`;
    strip.appendChild(d);
  });
  fxBuilt=true;
}
function updateFX(){
  if(!fxBuilt) buildFX();
  const dxy=computeDXY(); if(dxy) FX.DXY=dxy;
  PAIRS.forEach(p=>{
    const q=FX[p.k];
    const tile=$("fxstrip").querySelector(`.fxtile[data-k="${p.k}"]`); if(!tile) return;
    if(!q){ tile.style.display="none"; return; }
    tile.style.display="";
    const dec=p.k==="DXY"?3:decFor(q.bid);
    const px=tile.querySelector(".px"), chg=tile.querySelector(".chg"), prev=tile._bid;
    px.textContent=nf(q.bid,dec);
    chg.textContent=`${arrow(q.pct)} ${pf(q.pct)}`; chg.className="chg "+cls(q.pct);
    if(prev!=null && q.bid!==prev) flash(tile, q.bid-prev);
    tile._bid=q.bid;
    const rows=[];
    if(q.ask!=null){ rows.push(["bid",nf(q.bid,dec)],["ask",nf(q.ask,dec)]); }
    if(q.high!=null) rows.push(["high",nf(q.high,dec)]);
    if(q.low!=null)  rows.push(["low",nf(q.low,dec)]);
    rows.push(["chg",pf(q.pct)]);
    tile.querySelector(".tip").innerHTML=rows.map(([k,v])=>`<div><span>${k}</span><b>${v}</b></div>`).join("");
  });
}

/* ---------- curve ---------- */
function svensson(tau,p){
  const e=Math.exp,l1=p.l1,l2=p.l2;
  const t1=(1-e(-l1*tau))/(l1*tau),t2=t1-e(-l1*tau);
  const t3=(1-e(-l2*tau))/(l2*tau)-e(-l2*tau);
  return p.b1+p.b2*t1+p.b3*t2+p.b4*t3;
}
function computeCurve(){
  const vs=DATA.vencimentos,pre=DATA.pre,cup=(DATA.cupom&&DATA.cupom.byCode)||{};
  if(!vs||!pre||pre.b1==null||SPOT==null) return null;
  return vs.map(v=>{
    const tau=v.du/252, pr=svensson(tau,pre);
    const cv=cup[v.code]!=null?cup[v.code]:null, cp=(cv||0)/100;
    const dol=SPOT*Math.pow(1+pr,tau)/(1+cp*v.dc/360);
    return {...v,pre:pr*100,cup:cv,dol,pts:dol*1000};
  });
}
function buildTable(){
  const tb=$("dolTable").querySelector("tbody"); tb.innerHTML="";
  (DATA.vencimentos||[]).forEach(v=>{
    const tr=document.createElement("tr"); tr.dataset.code=v.code;
    const vd=v.venc.split("-").reverse().join("/");
    tr.innerHTML=`<td class="code">${v.code}</td><td class="dol">—</td><td>${vd}</td>
      <td>${v.du}</td><td class="pre">—</td><td class="cup">—</td><td class="pts">—</td>`;
    tb.appendChild(tr);
  });
  tableBuilt=true;
}
function updateTable(rows){
  if(!tableBuilt) buildTable();
  rows.forEach(r=>{
    const tr=$("dolTable").querySelector(`tr[data-code="${r.code}"]`); if(!tr) return;
    const dc=tr.querySelector(".dol"), prev=tr._dol;
    dc.textContent=nf(r.dol,4);
    tr.querySelector(".pre").textContent=r.pre.toFixed(3);
    tr.querySelector(".cup").textContent=r.cup!=null?r.cup.toFixed(3):"—";
    tr.querySelector(".pts").textContent=r.pts.toFixed(1);
    if(prev!=null && Math.abs(r.dol-prev)>1e-5) flash(dc, r.dol-prev);
    tr._dol=r.dol;
  });
}
function renderChart(rows){
  const W=780,H=248,padL=40,padR=12,padT=16,padB=22;
  const svg=$("chart"); svg.innerHTML="";
  const ns="http://www.w3.org/2000/svg";
  const ys=rows.map(r=>r.dol);
  let lo=Math.min(...ys),hi=Math.max(...ys);const m=(hi-lo)*0.16||0.1; lo-=m; hi+=m;
  const x=i=>padL+(W-padL-padR)*i/(rows.length-1);
  const y=v=>padT+(H-padT-padB)*(1-(v-lo)/(hi-lo));
  const mk=(t,a)=>{const e=document.createElementNS(ns,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  // gridlines + price labels
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const val=lo+(hi-lo)*i/ticks, yy=y(val);
    svg.appendChild(mk("line",{x1:padL,y1:yy,x2:W-padR,y2:yy,stroke:"var(--line)","stroke-width":1}));
    const t=mk("text",{x:padL-8,y:yy+3,fill:"var(--faint)","font-size":9,"text-anchor":"end","font-family":"var(--mono)"});
    t.textContent=val.toFixed(3); svg.appendChild(t);
  }
  // area + glow + line
  let dl=`M ${x(0)} ${y(rows[0].dol)}`, da=`M ${x(0)} ${y(rows[0].dol)}`;
  rows.forEach((r,i)=>{ if(i){dl+=` L ${x(i)} ${y(r.dol)}`; da+=` L ${x(i)} ${y(r.dol)}`;} });
  da+=` L ${x(rows.length-1)} ${H-padB} L ${x(0)} ${H-padB} Z`;
  const grad=mk("linearGradient",{id:"g1",x1:0,y1:0,x2:0,y2:1});
  grad.appendChild(mk("stop",{offset:"0%","stop-color":"var(--up)","stop-opacity":.22}));
  grad.appendChild(mk("stop",{offset:"100%","stop-color":"var(--up)","stop-opacity":0}));
  svg.appendChild(grad);
  svg.appendChild(mk("path",{d:da,fill:"url(#g1)"}));
  svg.appendChild(mk("path",{d:dl,fill:"none",stroke:"var(--up)","stroke-width":4,"stroke-opacity":.12})); // glow
  svg.appendChild(mk("path",{d:dl,fill:"none",stroke:"var(--up)","stroke-width":1.9,"stroke-linejoin":"round"}));
  rows.forEach((r,i)=>svg.appendChild(mk("circle",{cx:x(i),cy:y(r.dol),r:2.3,fill:"var(--up)"})));
  rows.forEach((r,i)=>{ if(i%2===0){ const t=mk("text",{x:x(i),y:H-6,fill:"var(--faint)",
    "font-size":9,"text-anchor":"middle","font-family":"var(--mono)"});
    t.textContent=r.code.slice(3); svg.appendChild(t);} });
  // crosshair (hidden until hover)
  const cl=mk("line",{x1:0,y1:padT,x2:0,y2:H-padB,stroke:"var(--amber)","stroke-width":1,
    "stroke-dasharray":"3 3","opacity":0}); cl.id="cross"; svg.appendChild(cl);
  const cd=mk("circle",{r:4,fill:"var(--amber)",opacity:0}); cd.id="crossdot"; svg.appendChild(cd);
  CHART={rows,x,y,W,padL,padR,padT,padB,H};
}
function chartHover(ev){
  if(!CHART) return;
  const wrap=$("chartwrap"), rect=wrap.getBoundingClientRect();
  const relX=ev.clientX-rect.left;
  const vbX=relX/rect.width*CHART.W;
  let i=Math.round((vbX-CHART.padL)/((CHART.W-CHART.padL-CHART.padR)/(CHART.rows.length-1)));
  i=Math.max(0,Math.min(CHART.rows.length-1,i));
  const r=CHART.rows[i], px=CHART.x(i), py=CHART.y(r.dol);
  const cross=$("cross"),dot=$("crossdot");
  cross.setAttribute("x1",px);cross.setAttribute("x2",px);cross.setAttribute("opacity",.6);
  dot.setAttribute("cx",px);dot.setAttribute("cy",py);dot.setAttribute("opacity",1);
  const ct=$("ctip");
  ct.innerHTML=`<div class="c">${r.code} · ${r.venc.split("-").reverse().join("/")}</div>
    <div class="d">${nf(r.dol,4)}</div><div class="p">${r.pts.toFixed(1)} pts · ${r.du} bd</div>`;
  ct.style.left=(px/CHART.W*rect.width)+"px";
  ct.style.top=(py/CHART.H*rect.height)+"px";
  ct.style.display="block";
}
function chartLeave(){ const c=$("cross"),d=$("crossdot"),t=$("ctip");
  if(c)c.setAttribute("opacity",0); if(d)d.setAttribute("opacity",0); if(t)t.style.display="none"; }

/* ---------- carry & focus ---------- */
function statRow(k,sub,v,unit,color){
  return `<div class="stat"><div class="k">${k}${sub?`<small>${sub}</small>`:""}</div>
    <div class="v ${color||""}">${v}<small>${unit||""}</small></div></div>`;
}
function renderCarry(){
  const r=DATA.rates||{}, el=$("carry");
  const g=o=>(o&&o.valor!=null)?o.valor:null;
  const selic=g(r.selic),ipca=g(r.ipca12m),real=g(r.juroreal),ptax=g(r.ptax);
  let di1=null; if(DATA.pre&&DATA.pre.b1!=null) di1=svensson(1,DATA.pre)*100;
  let h="";
  h+=statRow("Selic target","Copom · p.a.", selic!=null?nf(selic,2):"—","%");
  h+=statRow("DI 1y","ANBIMA curve · p.a.", di1!=null?di1.toFixed(2):"—","%");
  h+=statRow("IPCA","trailing 12m", ipca!=null?nf(ipca,2):"—","%");
  h+=statRow("Real rate","ex-post (Selic/IPCA)", real!=null?nf(real,2):"—","%", real!=null?cls(real):"");
  h+=statRow("PTAX","USD/BRL fix · BCB", ptax!=null?nf(ptax,4):"—","");
  el.innerHTML=h;
  if(r.ptax&&r.ptax.data) $("ratesDate").textContent="BCB · "+r.ptax.data;
  else if(r.selic&&r.selic.data) $("ratesDate").textContent="BCB · "+r.selic.data;
}
function renderFocus(){
  const f=DATA.focus||{}, el=$("focus");
  const fmt=(o,d=2)=>(o&&o.mediana!=null)?nf(Number(o.mediana),d):"—";
  let h="";
  h+=statRow("Selic","year-end",fmt(f.selic),"%");
  h+=statRow("IPCA","year-end",fmt(f.ipca),"%");
  h+=statRow("FX","USD/BRL year-end",fmt(f.cambio,2),"");
  h+=statRow("GDP","growth",fmt(f.pib),"%");
  el.innerHTML=h;
  if(f.ano) $("focusSub").textContent="median · year-end "+f.ano;
}

/* ---------- render ---------- */
function update(){
  updateFX();
  const rows=computeCurve();
  if(rows){ updateTable(rows); renderChart(rows); }
  renderCarry(); renderFocus();
  $("dataDate").textContent=DATA.refdate||"—";
}

/* ---------- data ---------- */
async function loadData(){
  try{
    const r=await fetch("./curve.json?t="+Date.now(),{cache:"no-store"});
    if(!r.ok) return;
    DATA=await r.json();
    if(DATA.fx&&!Object.keys(FX).length){
      for(const k in DATA.fx) FX[k]={bid:DATA.fx[k].bid,ask:DATA.fx[k].ask,pct:DATA.fx[k].pct};
      if(FX.USDBRL) SPOT=FX.USDBRL.bid;
    }
    update();
  }catch(e){}
}
async function fetchFX(){
  try{
    const r=await fetch(`https://economia.awesomeapi.com.br/json/last/${FEED}`,{cache:"no-store"});
    const d=await r.json();
    for(const k in d){ const v=d[k];
      FX[k]={bid:parseFloat(v.bid),ask:parseFloat(v.ask||v.bid),high:parseFloat(v.high),
             low:parseFloat(v.low),pct:parseFloat(v.pctChange||0)}; }
    if(FX.USDBRL) SPOT=FX.USDBRL.bid;
    update();
  }catch(e){}
}
// Focus puxado do navegador (IP residencial brasileiro não é bloqueado como o robô)
async function fetchFocus(){
  try{
    const yr=DATA.refdate? DATA.refdate.split("/")[2] : String(new Date().getFullYear());
    const inds=["IPCA","Selic","Câmbio","PIB Total"];
    const filt=`(${inds.map(i=>`Indicador eq '${i}'`).join(" or ")}) and DataReferencia eq '${yr}'`;
    const base="https://olinda.bcb.gov.br/olinda/servico/Expectativas/versao/v1/odata/ExpectativasMercadoAnuais";
    const url=`${base}?$top=120&$format=json&$orderby=${encodeURIComponent("Data desc")}&$filter=${encodeURIComponent(filt)}`;
    const r=await fetch(url,{cache:"no-store"}); const js=await r.json();
    const latest={}; (js.value||[]).forEach(o=>{ if(!latest[o.Indicador]) latest[o.Indicador]=o; });
    const map={IPCA:"ipca",Selic:"selic","Câmbio":"cambio","PIB Total":"pib"};
    const f={ano:yr}; let n=0;
    for(const ind in latest){ if(map[ind]){ f[map[ind]]={mediana:latest[ind].Mediana,data:latest[ind].Data}; n++; } }
    if(n){ DATA.focus=f; renderFocus(); }
  }catch(e){ /* CORS/erro -> usa o focus do curve.json (se houver) */ }
}
function tick(){ $("clock").textContent=new Date().toLocaleTimeString("en-GB"); }

$("chartwrap").addEventListener("mousemove",chartHover);
$("chartwrap").addEventListener("mouseleave",chartLeave);
tick(); setInterval(tick,1000);
loadData().then(fetchFocus);
fetchFX();
setInterval(fetchFX,5000);      // feed ao vivo: 5s
setInterval(loadData,3600000);
setInterval(fetchFocus,3600000);
</script>
