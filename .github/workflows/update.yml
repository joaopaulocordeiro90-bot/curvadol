name: Atualiza curva DOL

on:
  schedule:
    - cron: "30 22 * * 1-5"
    - cron: "30 0 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instala dependencias
        run: pip install -r requirements.txt
      - name: Roda o robo
        run: python robot.py
      - name: Salva curve.json
        run: |
          git config user.name "curva-dol-robo"
          git config user.email "actions@github.com"
          git add curve.json
          git diff --staged --quiet || git commit -m "curva: $(date -u +%Y-%m-%d_%H:%M)"
          git push
